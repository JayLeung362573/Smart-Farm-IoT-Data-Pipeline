name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API test image
        run: docker compose build api

      - name: Run tests
        run: docker compose run --rm --no-deps api python -m pytest