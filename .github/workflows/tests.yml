name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -m "not integration"

  integration-tests:
    name: PostgreSQL Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "3221"
          POSTGRES_DB: smart_farm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d smart_farm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Initialize database schema
        env:
          PGPASSWORD: "3221"
        run: |
          psql \
            --host=127.0.0.1 \
            --port=5432 \
            --username=postgres \
            --dbname=smart_farm \
            --file=sql/schema.sql

      - name: Run database integration test
        env:
          RUN_DB_INTEGRATION: "1"
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_NAME: smart_farm
          DB_USER: postgres
          DB_PASSWORD: "3221"
        run: python -m pytest tests/test_db_integration.py -v
